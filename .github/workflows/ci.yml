name: CI

on: [push, pull_request]

env:
  # 2026-06-10: GitHub 将于 2026-06-16 默认切到 Node24，2026-09-16 移除 Node20 runner。
  # 提前开启此环境变量，让 runner 把 JS action 强制跑在 Node24 上，避免 deprecation。
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  node_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
